name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: windows-latest
            goos: windows
            goarch: amd64
            platform: windows-amd64
            native_platform: windows-amd64
            extension: .exe
            archive: zip
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            platform: linux-amd64
            native_platform: linux-amd64
            extension: ""
            archive: tar.gz
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            platform: macos-amd64
            native_platform: darwin-amd64
            extension: ""
            archive: tar.gz
          - runner: macos-14
            goos: darwin
            goarch: arm64
            platform: macos-arm64
            native_platform: darwin-arm64
            extension: ""
            archive: tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up MinGW-w64
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Set up Rust for Windows GNU
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          rustup target add x86_64-pc-windows-gnu

      - name: Build resvg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: C:\msys64\mingw64\bin\gcc.exe
        run: ./scripts/build-resvg.ps1

      - name: Build resvg on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: sh scripts/build-resvg.sh

      - name: Configure Rust native link libraries
        if: runner.os != 'Windows'
        shell: bash
        run: echo "CGO_LDFLAGS=$(cat internal/resvg/lib/${{ matrix.native_platform }}/native-static-libs.txt)" >> "$GITHUB_ENV"

      - name: Build application on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: gcc
        run: |
          New-Item -ItemType Directory -Force dist/package | Out-Null
          go build -trimpath -ldflags "-s -w" -o "dist/package/qq-quote-generator${{ matrix.extension }}" .
          Copy-Item README.md dist/package/README.md

      - name: Build application on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/package
          go build -trimpath -ldflags "-s -w" -o "dist/package/qq-quote-generator${{ matrix.extension }}" .
          cp README.md dist/package/README.md

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "qq-quote-generator_${env:GITHUB_REF_NAME}_${{ matrix.platform }}.zip"
          Compress-Archive -Path dist/package/* -DestinationPath "dist/$name"

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          name="qq-quote-generator_${GITHUB_REF_NAME}_${{ matrix.platform }}.tar.gz"
          tar -C dist/package -czf "dist/$name" .

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: qq-quote-generator-${{ matrix.platform }}
          path: dist/*.${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all archives
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
